name: Run Tests

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install

      - name: Start mock service
        run: poetry run python -m mock_service.main > mock_service.log 2>&1 &

      - name: Wait for mock service
        run: |
          for i in $(seq 1 30); do
            curl -s http://127.0.0.1:5000/task/1 && break
            sleep 1
          done

      - name: Run tests
        run: poetry run pytest -m "task_api" -vv --env mock
